services:
  db:
    image: postgres:16
    container_name: logify-db
    restart: always
    environment:
      POSTGRES_DB: logify
      POSTGRES_USER: logifyuser
      POSTGRES_PASSWORD: logifypassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build: ./logify-backend
    container_name: logify-backend
    ports:
      - "8080:8080"
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      BACKEND_URL: http://logify-backend:8080
      POSTGRES_DB: logify
      POSTGRES_USER: logifyuser
      POSTGRES_PASSWORD: logifypassword
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8080

  frontend:
    build: ./logify-frontend
    container_name: logify-frontend
    ports:
      - "3000:3000"
    restart: always
    environment:
      FRONTEND_BACKEND_URL: http://logify-backend:8080
    depends_on:
      - backend


volumes:
  postgres_data:
