version: "3.9"

services:
  backend:
    build: ./logify-backend
    container_name: logify-backend
    ports:
      - "8080:8080"
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - BACKEND_URL=http://logify-backend:8080
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8080

  frontend:
    build: ./logify-frontend
    container_name: logify-frontend
    ports:
      - "3000:3000"
    restart: always
    environment:
      - FRONTEND_BACKEND_URL=http://logify-backend:8080
    depends_on:
      - backend
    command: pnpm serve dist -- --single --listen 3000
